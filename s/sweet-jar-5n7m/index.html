<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Jar Full of Smiles!</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600&family=Quicksand:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="sky-bg">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
    </div>

    <div class="jar-wrapper">
        <h1 class="title">Need a smile? ✨</h1>
        <p class="subtitle">Click the jar to get a surprise heart!</p>

        <div id="jar" class="jar">
            <div class="jar-top"></div>
            <div class="jar-body">
                <!-- Tiny hearts inside the jar -->
                <div class="mini-heart">❤️</div>
                <div class="mini-heart">💕</div>
                <div class="mini-heart">💖</div>
                <div class="mini-heart">💘</div>
                <div class="mini-heart">💓</div>
            </div>
            <div class="label">Sweetness</div>
        </div>

        <div id="heart-container"></div>
    </div>

    <script src="main.js"></script>
</body>

</html>
