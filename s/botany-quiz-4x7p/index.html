<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Botanist's Exam 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600&family=Quicksand:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="theme-neutral">
    <div id="game-container">
        <!-- Character Display Section -->
        <div id="character-section" class="character-area">
            <div id="main-character" class="character-sprout">
                <div class="eyes"></div>
                <div class="mouth"></div>
                <div class="accessory"></div>
            </div>
            <div id="feedback-text" class="feedback-bubble">Ready to start?</div>
        </div>

        <!-- Start/Difficulty Screen -->
        <div id="start-screen" class="screen">
            <h1 class="title">Botanist's Secret Garden 🌿</h1>
            <p class="subtitle">Prepare for PhD-Level Intellectual Bloom</p>
            <div class="difficulty-picker">
                <button class="diff-btn easy" onclick="startGame('EASY')">Easy<br><span>(Doctoral Intro)</span></button>
                <button class="diff-btn medium" onclick="startGame('MEDIUM')">Medium<br><span>(Research
                        Fellow)</span></button>
                <button class="diff-btn hard" onclick="startGame('HARD')">Hard<br><span>(Senior PI)</span></button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen hidden">
            <div class="quiz-header">
                <span id="progress-text">Question 1/10</span>
                <span id="score-text">Score: 0</span>
            </div>
            <div id="question-container">
                <h2 id="question-text">Loading question...</h2>
                <div id="options-container" class="options-grid">
                    <!-- Options injected here -->
                </div>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="screen hidden">
            <h1 class="final-title">Research Concluded!</h1>
            <div class="final-score-area">
                <span id="final-score-val">0</span>
                <span>/ 10</span>
            </div>
            <p id="rank-text"></p>
            <button class="reset-btn" onclick="location.reload()">Return to Lab 🧪</button>
        </div>
    </div>

    <!-- Background Elements -->
    <div id="particles-container"></div>

    <script src="main.js"></script>
</body>

</html>
