<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello!</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Quicksand:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Floating Background Elements -->
    <div id="hearts-bg"></div>

    <div class="card">
        <div class="character-wrapper">
            <!-- Cute CSS Bear -->
            <div class="bear">
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="face">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="blush left"></div>
                    <div class="blush right"></div>
                    <div class="nose"></div>
                    <div class="mouth"></div>
                </div>
            </div>
        </div>

        <h1 id="question">Do you like me? 🧸</h1>

        <div class="button-group">
            <button id="yes-btn" class="btn yes">Yes!</button>
            <button id="no-btn" class="btn no">No</button>
        </div>
    </div>

    <!-- Celebration Screen (hidden by default) -->
    <div id="celebration" class="hidden">
        <div class="success-content">
            <div class="heart-pulse">💖</div>
            <h1>YAY! I Knew It! 🥰</h1>
            <p>You're the absolute cutest!</p>
        </div>
    </div>

    <script src="main.js"></script>
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>

</html>
